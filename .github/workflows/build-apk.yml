name: Build CryptoWatch APK

on:
  push:
    branches:
      - claude/crypto-price-monitor-app-RpMFm
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Debug ambiente Android
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_HOME/cmdline-tools/ || echo "cmdline-tools non trovato"

      - name: Accetta licenze e installa Android 35
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: npm ci
        run: npm ci

      - name: Build Vite
        run: npm run build

      - name: Cap sync
        run: npx cap sync android

      - name: Permessi Gradle
        run: chmod +x android/gradlew

      - name: Build APK debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CryptoWatch-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
